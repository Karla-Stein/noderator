{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'workflows/css/workflows.css' %}">
{% endblock %}

{% block content %}
<section id="prompt">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-lg-8">
                <h3>
                    Tell us what you want to build!
                </h3>
                <hr>
                <p></p>
                <form method="post" action="{% url 'workflows' %}" id="prompt-form">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="text-end">
                        <button id="submit-button" type="submit" class="btn">Build It
                            <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

{% endblock %}
